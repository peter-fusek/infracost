services:
  - type: web
    name: infracost
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm drizzle-kit push && pnpm build
    startCommand: node .output/server/index.mjs
    # Custom domain infracost.eu configured via Render dashboard (not supported in blueprint on free plan)
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NUXT_SESSION_PASSWORD
        sync: false
      - key: NUXT_OAUTH_GOOGLE_CLIENT_ID
        sync: false
      - key: NUXT_OAUTH_GOOGLE_CLIENT_SECRET
        sync: false
      - key: ALLOWED_EMAILS
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: ANTHROPIC_ADMIN_API_KEY
        sync: false
      - key: RAILWAY_API_TOKEN
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: NEON_API_KEY
        sync: false
      - key: TURSO_API_TOKEN
        sync: false
      - key: UPTIMEROBOT_API_KEY
        sync: false
      - key: ALERT_FROM_EMAIL
        sync: false
      - key: ALERT_TO_EMAIL
        sync: false
      - key: WHATSAPP_PHONE
        sync: false
      - key: WHATSAPP_APIKEY
        sync: false
      - key: NUXT_PUBLIC_GA_ID
        sync: false
